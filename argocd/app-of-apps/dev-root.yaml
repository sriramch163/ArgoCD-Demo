apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: dev-root
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/sriramch163/ArgoCD-Copilot.git
    targetRevision: HEAD
    path: argocd/applications/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
